addr: ":9090"

# Global snapshot and retention settings
snapshot:
  interval: 24h       # Take a full snapshot every 24 hours
  retention: 720h     # Keep snapshots and logs for 30 days (safe against long outages)

dbs:
  - path: /data/db.sqlite
    replicas:
      - type: gs
        bucket: solex-storage
        path: headscale
        credentials-file: /data/gcp-credentials.json
